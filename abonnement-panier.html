<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon abonnement — Pousses Vivantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest: #1a2e1a; --moss: #2d4a2d; --sage: #5a7a4e;
      --fern: #7aab62; --mist: #c8dab8; --cream: #f5f0e8;
      --ivory: #fdfaf4; --gold: #c9a84c;
      --text-body: #3a3a3a;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: var(--font-body); background: #e8f0e0; color: var(--text-body); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* NAV */
    nav {
      background: rgba(232,240,224,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 1rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .nav-logo { font-family: var(--font-display); font-size: 1.4rem; font-weight: 300; color: var(--forest); display: flex; align-items: center; gap: 0.5rem; }
    .nav-back { font-size: 0.82rem; color: var(--sage); display: inline-flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
    .nav-back:hover { color: var(--forest); }

    /* LAYOUT */
    .cart-wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 3rem 2rem 6rem;
      display: grid; grid-template-columns: 1fr 420px; gap: 3rem;
      align-items: start;
    }
    @media (max-width: 820px) {
      .cart-wrap { grid-template-columns: 1fr; padding: 2rem 1.2rem 4rem; }
      .cart-summary { order: -1; }
      nav { padding: 1rem 1.5rem; }
    }

    /* LEFT — PRODUCT */
    .cart-products h2 {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-body);
      padding-bottom: 0.8rem;
      border-bottom: 1.5px solid rgba(0,0,0,0.12);
      margin-bottom: 1.5rem;
      display: flex; justify-content: space-between;
    }
    .cart-products h2 span { color: var(--text-body); }

    .cart-item-row {
      display: flex; gap: 1.2rem; align-items: flex-start;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .ci-thumb {
      width: 72px; height: 72px; border-radius: 8px;
      object-fit: cover; background: var(--mist); flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .ci-info { flex: 1; }
    .ci-name { font-size: 0.95rem; font-weight: 500; color: var(--forest); margin-bottom: 0.25rem; }
    .ci-prices { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .ci-old { font-size: 0.85rem; color: #aaa; text-decoration: line-through; }
    .ci-new { font-size: 0.9rem; font-weight: 500; color: var(--text-body); }
    .ci-freq { font-size: 0.82rem; color: var(--sage); }
    .ci-saving {
      display: inline-block; font-size: 0.72rem; font-weight: 500;
      background: rgba(90,122,78,0.12); color: var(--sage);
      padding: 0.15rem 0.55rem; border-radius: 4px; margin-top: 0.3rem;
    }
    .ci-desc { font-size: 0.82rem; color: #888; line-height: 1.5; margin-top: 0.5rem; }
    .ci-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.8rem; flex-shrink: 0; }
    .ci-total { font-size: 0.95rem; font-weight: 500; color: var(--text-body); }
    .ci-delete {
      background: none; border: none; cursor: pointer;
      color: #bbb; font-size: 1.1rem; transition: color 0.2s;
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
    }
    .ci-delete:hover { color: #d04040; }

    .cart-empty-state {
      display: none; text-align: center; padding: 3rem 0;
      color: var(--sage); font-size: 0.88rem;
    }
    .cart-empty-state.show { display: block; }
    .cart-empty-state p { margin-top: 0.5rem; }
    .back-link { display: inline-block; margin-top: 1rem; color: var(--fern); font-size: 0.82rem; }
    .back-link:hover { text-decoration: underline; }

    /* RIGHT — SUMMARY */
    .cart-summary {
      background: rgba(232,240,224,0.6);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 4px;
      overflow: hidden;
      position: sticky; top: 80px;
    }
    .cs-title {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-body);
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    /* Coupon */
    .cs-coupon {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .cs-coupon span { font-size: 0.88rem; color: var(--text-body); }
    .cs-coupon-icon { color: var(--sage); font-size: 1rem; transition: transform 0.2s; }
    .cs-coupon-form { padding: 0 1.5rem 1rem; display: none; }
    .cs-coupon-form.open { display: flex; gap: 0.5rem; }
    .cs-coupon-input {
      flex: 1; padding: 0.55rem 0.8rem;
      border: 1px solid rgba(0,0,0,0.15); border-radius: 4px;
      font-family: var(--font-body); font-size: 0.82rem;
      background: white; outline: none;
    }
    .cs-coupon-input:focus { border-color: var(--fern); }
    .cs-coupon-btn {
      padding: 0.55rem 0.9rem;
      background: var(--forest); color: white;
      border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.78rem; font-weight: 500;
      transition: background 0.2s;
    }
    .cs-coupon-btn:hover { background: var(--fern); }

    /* Lines */
    .cs-lines { padding: 1rem 1.5rem; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 0.55rem; }
    .cs-line { display: flex; justify-content: space-between; font-size: 0.88rem; color: var(--text-body); }
    .cs-line.total-today { font-size: 1rem; font-weight: 600; padding-top: 0.6rem; border-top: 1px solid rgba(0,0,0,0.1); margin-top: 0.2rem; }

    /* Recurring */
    .cs-recurring {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .cs-rec-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.88rem; font-weight: 500; color: var(--text-body);
      cursor: pointer; margin-bottom: 0.2rem;
    }
    .cs-rec-date { font-size: 0.75rem; color: var(--sage); margin-bottom: 0.5rem; }
    .cs-rec-toggle { font-size: 0.85rem; color: var(--sage); transition: transform 0.2s; }
    .cs-rec-details { display: none; }
    .cs-rec-details.open { display: flex; flex-direction: column; gap: 0.45rem; margin-top: 0.8rem; }
    .cs-rec-line { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--sage); }
    .cs-rec-line.total { color: var(--text-body); font-weight: 500; padding-top: 0.4rem; border-top: 1px solid rgba(0,0,0,0.08); }

    /* OR / CTA */
    .cs-or { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.5rem 0; }
    .cs-or-line { flex: 1; border-top: 1px solid rgba(0,0,0,0.1); }
    .cs-or-text { font-size: 0.72rem; letter-spacing: 0.08em; color: #aaa; }

    .cs-cta {
      display: block; width: calc(100% - 3rem); margin: 0.8rem 1.5rem 1.5rem;
      padding: 1rem;
      background: var(--moss); color: white; text-align: center;
      border-radius: 4px; border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.25s;
      text-decoration: none;
    }
    .cs-cta:hover { background: var(--forest); }
    .cs-cta.disabled { opacity: 0.45; pointer-events: none; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none"><path d="M14 4V20M14 12C14 12 10 9 7 9M14 16C14 16 18 13 21 12" stroke="#1a2e1a" stroke-width="1.5" stroke-linecap="round"/></svg>
      Pousses Vivantes
    </a>
    <a href="index.html#abonnements" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Retour aux abonnements
    </a>
  </nav>

  <div class="cart-wrap">

    <!-- LEFT -->
    <div class="cart-products">
      <h2>PRODUIT <span id="colTotal">TOTAL</span></h2>

      <div class="cart-item-row" id="cartItemRow">
        <img class="ci-thumb" id="ciThumb" src="" alt="" />
        <div class="ci-info">
          <div class="ci-name" id="ciName">—</div>
          <div class="ci-prices">
            <span class="ci-old" id="ciOld"></span>
            <span class="ci-new" id="ciNew"></span>
            <span class="ci-freq" id="ciFreq"></span>
          </div>
          <span class="ci-saving" id="ciSaving"></span>
          <p class="ci-desc" id="ciDesc"></p>
        </div>
        <div class="ci-right">
          <span class="ci-total" id="ciTotal"></span>
          <button class="ci-delete" onclick="removePlan()" title="Supprimer">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4l1 9h4l1-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <div class="cart-empty-state" id="emptyState">
        <div style="font-size:2rem">🌱</div>
        <p>Votre panier est vide.</p>
        <a href="index.html#abonnements" class="back-link">← Choisir un abonnement</a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="cart-summary">
      <div class="cs-title">TOTALES DU PANIER</div>

      <!-- Coupon -->
      <div class="cs-coupon" onclick="toggleCoupon()">
        <span>Ajouter un coupon</span>
        <span class="cs-coupon-icon" id="couponIcon">∨</span>
      </div>
      <div class="cs-coupon-form" id="couponForm">
        <input class="cs-coupon-input" type="text" placeholder="Code promo…" id="couponInput" />
        <button class="cs-coupon-btn" onclick="applyCoupon()">Appliquer</button>
      </div>

      <!-- Subtotal + shipping -->
      <div class="cs-lines">
        <div class="cs-line"><span>Sous-total</span><span id="subtotal">—</span></div>
        <div class="cs-line"><span>Livraison</span><span id="shipping">—</span></div>
        <div class="cs-line total-today"><span>Total aujourd'hui</span><span id="totalToday">—</span></div>
      </div>

      <!-- Recurring -->
      <div class="cs-recurring">
        <div class="cs-rec-header" onclick="toggleRecurring()">
          <div>
            <div>Total récurrent hebdomadaire &nbsp;<span id="recTotal">—</span></div>
            <div class="cs-rec-date" id="recDate"></div>
          </div>
          <span class="cs-rec-toggle" id="recToggle">∧</span>
        </div>
        <div class="cs-rec-details open" id="recDetails">
          <div class="cs-rec-line"><span>Sous-total</span><span id="recSubtotal">—</span></div>
          <div class="cs-rec-line"><span>Livraison</span><span id="recShipping">—</span></div>
          <div class="cs-rec-line total"><span>Total</span><span id="recTotalLine">—</span></div>
        </div>
      </div>

      <!-- OR / CTA -->
      <div class="cs-or">
        <div class="cs-or-line"></div>
        <div class="cs-or-text">OU</div>
        <div class="cs-or-line"></div>
      </div>
      <a href="paiement.html" class="cs-cta" id="ctaBtn">Passer au paiement</a>
    </div>

  </div>

  <script>
    const PLANS = {
      basic: {
        name: 'Basic Subscription',
        packs: 8,
        oldPrice: 280,
        newPrice: 238,
        shipping: 50,
        img: 'Liste complète des variétés de micro pousses comestibles_fichiers/667484df2a4ea_micro-pousse-tournesol.jpg',
        desc: 'Rejoignez notre programme d\'abonnement et profitez de 8 barquettes de micro-pousses ultra-fraîches cultivées sur commande, sans vous soucier de rien.'
      },
      advanced: {
        name: 'Advanced Subscription',
        packs: 12,
        oldPrice: 420,
        newPrice: 357,
        shipping: 50,
        img: 'Liste complète des variétés de micro pousses comestibles_fichiers/6674812d9093c_micro-pousses-chou-rouge.jpg',
        desc: 'Rejoignez notre programme d\'abonnement et profitez de 12 barquettes de micro-pousses ultra-fraîches cultivées sur commande, sans vous soucier de rien.'
      },
      premium: {
        name: 'Premium Subscription',
        packs: 16,
        oldPrice: 560,
        newPrice: 476,
        shipping: 0,
        img: 'Liste complète des variétés de micro pousses comestibles_fichiers/66747fb00efa7_micro-pousses-brocoli.jpg',
        desc: 'Rejoignez notre programme d\'abonnement et profitez de 16 barquettes de micro-pousses ultra-fraîches cultivées sur commande, sans vous soucier de rien.'
      }
    };

    // Lire le plan depuis l'URL
    const params = new URLSearchParams(window.location.search);
    const planKey = params.get('plan') || localStorage.getItem('pv_sub_plan');
    let currentPlan = planKey && PLANS[planKey] ? PLANS[planKey] : null;

    function fmt(n) { return n === 0 ? 'Gratuit' : n + ' MAD'; }

    function renderPlan() {
      const row = document.getElementById('cartItemRow');
      const empty = document.getElementById('emptyState');
      const cta = document.getElementById('ctaBtn');

      if (!currentPlan) {
        row.style.display = 'none';
        empty.classList.add('show');
        cta.classList.add('disabled');
        ['subtotal','shipping','totalToday','recTotal','recSubtotal','recShipping','recTotalLine'].forEach(id => {
          document.getElementById(id).textContent = '—';
        });
        return;
      }

      row.style.display = 'flex';
      empty.classList.remove('show');
      cta.classList.remove('disabled');

      const p = currentPlan;
      const saving = p.oldPrice - p.newPrice;
      const total = p.newPrice + p.shipping;

      document.getElementById('ciThumb').src = p.img;
      document.getElementById('ciThumb').alt = p.name;
      document.getElementById('ciName').textContent = p.name;
      document.getElementById('ciOld').textContent = p.oldPrice + ' MAD';
      document.getElementById('ciNew').textContent = p.newPrice + ' MAD';
      document.getElementById('ciFreq').textContent = 'chaque semaine';
      document.getElementById('ciSaving').textContent = 'Économie ' + saving + ' MAD / semaine';
      document.getElementById('ciDesc').textContent = p.desc;
      document.getElementById('ciTotal').textContent = p.newPrice + ' MAD';

      document.getElementById('subtotal').textContent = p.newPrice + ' MAD';
      document.getElementById('shipping').textContent = fmt(p.shipping);
      document.getElementById('totalToday').textContent = total + ' MAD';

      document.getElementById('recTotal').textContent = total + ' MAD';
      document.getElementById('recSubtotal').textContent = p.newPrice + ' MAD';
      document.getElementById('recShipping').textContent = fmt(p.shipping);
      document.getElementById('recTotalLine').textContent = total + ' MAD';

      // Date de début (dans 7 jours)
      const start = new Date();
      start.setDate(start.getDate() + 7);
      const opts = { day: 'numeric', month: 'long', year: 'numeric' };
      document.getElementById('recDate').textContent = 'À partir du ' + start.toLocaleDateString('fr-FR', opts);

      // Sauvegarder en localStorage pour la page paiement
      localStorage.setItem('pv_sub_plan', planKey || '');
      localStorage.setItem('pv_sub_data', JSON.stringify({ name: p.name, newPrice: p.newPrice, shipping: p.shipping, total }));
    }

    function removePlan() {
      currentPlan = null;
      localStorage.removeItem('pv_sub_plan');
      localStorage.removeItem('pv_sub_data');
      renderPlan();
    }

    let couponOpen = false;
    function toggleCoupon() {
      couponOpen = !couponOpen;
      document.getElementById('couponForm').classList.toggle('open', couponOpen);
      document.getElementById('couponIcon').textContent = couponOpen ? '∧' : '∨';
    }
    function applyCoupon() {
      const val = document.getElementById('couponInput').value.trim();
      if (!val) return;
      alert('Code "' + val + '" non reconnu.');
    }

    let recOpen = true;
    function toggleRecurring() {
      recOpen = !recOpen;
      document.getElementById('recDetails').classList.toggle('open', recOpen);
      document.getElementById('recToggle').textContent = recOpen ? '∧' : '∨';
    }

    renderPlan();
  </script>

</body>
</html>
